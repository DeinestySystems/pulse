<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEINESTY PULSE OS</title>
    <style>
        /* UPDATED TO YOUR CHROMEBOOK THEME COLORS */
        :root { 
            --bg: #0f0b08; /* Deep dark brown/black */
            --panel: rgba(38, 28, 20, 0.7); /* Warm dark mahogany */
            --accent: #ff9d00; /* Your Chromebook Amber/Orange */
            --text: #fef3c7; /* Soft cream text */
        }
        
        body { 
            background: radial-gradient(circle at center, #261c14 0%, #0f0b08 100%); 
            color: var(--text); font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; overflow-x: hidden;
        }
        
        .status-bar { width: 100%; padding: 10px 20px; display: flex; justify-content: flex-end; gap: 15px; font-size: 0.7rem; opacity: 0.6; box-sizing: border-box; color: var(--accent); }

        .hero { margin-top: 20px; text-align: center; }
        #clock { font-size: 3.5rem; font-weight: 200; margin: 0; letter-spacing: 2px; color: var(--accent); text-shadow: 0 0 20px rgba(255, 157, 0, 0.3); }
        .search-box { 
            margin-top: 20px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,157,0,0.2);
            padding: 10px 25px; border-radius: 50px; width: 300px; color: #94a3b8; font-size: 0.9rem;
            display: flex; align-items: center; gap: 10px;
        }

        .app-grid { 
            display: grid; grid-template-columns: repeat(4, 1fr); 
            gap: 20px; padding: 40px; max-width: 850px; width: 95%; margin-bottom: 100px;
        }
        .card { 
            background: var(--panel); border: 1px solid rgba(255,157,0,0.1); 
            border-radius: 24px; padding: 22px 5px; text-decoration: none; 
            color: white; display: flex; flex-direction: column; align-items: center; 
            transition: 0.2s; backdrop-filter: blur(12px);
        }
        .card:hover { transform: scale(1.05); border-color: var(--accent); box-shadow: 0 0 20px rgba(255, 157, 0, 0.2); }
        .icon { font-size: 2.2rem; margin-bottom: 10px; filter: drop-shadow(0 0 5px rgba(255,157,0,0.2)); }
        .label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1.2px; color: #d4a373; }

        .dock { 
            position: fixed; bottom: 25px; background: rgba(20, 15, 10, 0.9); 
            backdrop-filter: blur(20px); padding: 12px 25px; border-radius: 30px; 
            border: 1px solid rgba(255,157,0,0.2); display: flex; gap: 20px; 
            align-items: center; box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }
        .dock-icon { font-size: 1.6rem; cursor: pointer; transition: 0.2s; color: var(--accent); }
        .dock-icon:hover { transform: scale(1.2) translateY(-5px); text-shadow: 0 0 10px var(--accent); }
    </style>
</head>
<body>

    <div class="status-bar">
        <span>Wi-Fi: Connected</span>
        <span>Battery: 88%</span>
    </div>

    <div class="hero">
        <h1 id="clock">12:00</h1>
        <div class="search-box"><span>🔍</span> Search DEINESTY Systems...</div>
    </div>

    <div class="app-grid">
        <a href="#" class="card"><div class="icon">📈</div><div class="label">Markets</div></a>
        <a href="#" class="card"><div class="icon">☁️</div><div class="label">Weather</div></a>
        <a href="#" class="card"><div class="icon">📅</div><div class="label">Calendar</div></a>
        <a href="#" class="card"><div class="icon">🎬</div><div class="label">Videos</div></a>
        
        <a href="#" class="card"><div class="icon">🎵</div><div class="label">Music</div></a>
        <a href="#" class="card"><div class="icon">🛒</div><div class="label">Shopping</div></a>
        <a href="#" class="card"><div class="icon">🏃</div><div class="label">Health</div></a>
        <a href="#" class="card"><div class="icon">📱</div><div class="label">Social</div></a>

        <a href="#" class="card"><div class="icon">📰</div><div class="label">News</div></a>
        <a href="#" class="card"><div class="icon">📝</div><div class="label">Notes</div></a>
        <a href="#" class="card"><div class="icon">🔢</div><div class="label">Calculator</div></a>
        <a href="#" class="card" style="border-color: var(--accent); background: rgba(255,157,0,0.05);">
            <div class="icon">💎</div><div class="label" style="color: var(--accent);">Pro Systems</div>
        </a>
    </div>

    <div class="dock">
        <div class="dock-icon">⭕</div>
        <div class="dock-icon">🌐</div>
        <div class="dock-icon">✉️</div>
        <div class="dock-icon">📂</div>
        <div class="dock-icon">⚙️</div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ":" + 
                            now.getMinutes().toString().padStart(2, '0');
            document.getElementById('clock').textContent = timeStr;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>

</body>
</html>
