<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEINESTY PULSE OS</title> 
    <style>
        :root { 
            --bg: #0f0b08; 
            --panel: rgba(38, 28, 20, 0.85); 
            --accent: #ff9d00; 
            --text-main: #fef3c7; 
        }
        
        body { 
            background: radial-gradient(circle at center, #261c14 0%, #0f0b08 100%); 
            color: var(--text-main); font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; display: flex; flex-direction: column; align-items: center; 
            height: 100vh; width: 100vw; overflow: hidden;
        }
        
        .status-bar { width: 100%; padding: 5px 25px; display: flex; justify-content: flex-end; gap: 15px; font-size: 0.65rem; opacity: 0.6; color: var(--accent); }

        .logo-container { margin-top: 5px; display: flex; flex-direction: column; align-items: center; }
        .main-logo { width: 45px; height: 45px; filter: drop-shadow(0 0 8px rgba(255, 157, 0, 0.5)); }
        
        .brand-name { 
            letter-spacing: 8px; font-weight: 300; font-size: 1.4rem; margin: 2px 0 0 0; 
            color: var(--accent) !important; 
            text-shadow: 0 0 15px rgba(255, 157, 0, 0.3);
        }

        .hero { margin-top: 0px; text-align: center; }
        #clock { font-size: 2.8rem; font-weight: 200; margin: 0; color: var(--accent); }
        
        .search-box { 
            margin: 5px auto; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,157,0,0.3);
            padding: 8px 20px; border-radius: 50px; width: 360px; color: #94a3b8; font-size: 0.75rem;
            display: flex; align-items: center; gap: 10px;
        }

        .app-grid { 
            display: grid; grid-template-columns: repeat(4, 1fr); 
            gap: 10px; padding: 10px; max-width: 900px; width: 92%; 
            margin-top: 5px;
        }
        
        .card { 
            background: var(--panel); border: 2px solid rgba(255,157,0,0.2); 
            border-radius: 20px; padding: 15px 5px; text-decoration: none; 
            display: flex; flex-direction: column; align-items: center; 
            transition: 0.15s; backdrop-filter: blur(12px);
        }
        .card:hover { transform: scale(1.02); border-color: var(--accent); background: rgba(255,157,0,0.1); }
        
        .icon { font-size: 1.8rem; margin-bottom: 6px; } 
        
        .label { 
            font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px; 
            color: var(--accent) !important; 
            font-weight: 700; 
        }

        .dock-wrapper { 
            width: 100%; 
            display: flex; 
            justify-content: center; 
            margin-top: auto; 
            padding-bottom: 40px; /* RAISED DOCK FOR BETTER VISIBILITY */
        }
        
        .dock { 
            background: rgba(15, 10, 5, 0.98); backdrop-filter: blur(20px); 
            padding: 10px 30px; border-radius: 50px; border: 1px solid rgba(255,157,0,0.4); 
            display: flex; gap: 30px; align-items: center; box-shadow: 0 10px 40px rgba(0,0,0,0.9);
        }
        .dock-icon { font-size: 1.6rem; cursor: pointer; color: var(--accent); }
    </style>
</head>
<body>

    <div class="status-bar">
        <span>Wi-Fi: Connected</span>
        <span>Battery: 88%</span>
    </div>

    <div class="logo-container">
        <svg class="main-logo" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="48" stroke="#ff9d00" stroke-width="2" stroke-dasharray="10 5"/>
            <path d="M35 30V70C35 70 65 70 65 50C65 30 35 30 35 30Z" stroke="#ff9d00" stroke-width="4" stroke-linejoin="round"/>
            <path d="M35 50H45L50 40L55 60L60 50H70" stroke="#fef3c7" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <h1 class="brand-name">DEINESTY PULSE OS</h1>
    </div>

    <div class="hero">
        <h1 id="clock">00:00</h1>
        <div class="search-box"><span>🔍</span> SEARCH DEINESTY SYSTEMS OS...</div>
    </div>

    <div class="app-grid">
        <a href="https://www.google.com/finance" target="_blank" class="card"><div class="icon">📈</div><div class="label">Markets</div></a>
        <a href="https://weather.com" target="_blank" class="card"><div class="icon">☁️</div><div class="label">Weather</div></a>
        <a href="https://calendar.google.com" target="_blank" class="card"><div class="icon">📅</div><div class="label">Calendar</div></a>
        <a href="https://www.youtube.com" target="_blank" class="card"><div class="icon">🎬</div><div class="label">Videos</div></a>
        <a href="https://music.youtube.com" target="_blank" class="card"><div class="icon">🎵</div><div class="label">Music</div></a>
        <a href="https://www.amazon.com" target="_blank" class="card"><div class="icon">🛒</div><div class="label">Shopping</div></a>
        <a href="https://www.fitbit.com" target="_blank" class="card"><div class="icon">🏃</div><div class="label">Health</div></a>
        <a href="https://www.instagram.com" target="_blank" class="card"><div class="icon">📱</div><div class="label">Social</div></a>
        <a href="https://news.google.com" target="_blank" class="card"><div class="icon">📰</div><div class="label">News</div></a>
        <a href="https://keep.google.com" target="_blank" class="card"><div class="icon">📝</div><div class="label">Notes</div></a>
        <a href="https://www.desmos.com/scientific" target="_blank" class="card"><div class="icon">🔢</div><div class="label">Calculator</div></a>
        <a href="https://github.com" target="_blank" class="card"><div class="icon">🛠️</div><div class="label">Tools</div></a>
        <a href="javascript:void(0)" class="card" style="background: rgba(255,157,0,0.15); grid-column: span 4; padding: 10px;">
            <div class="icon">💎</div><div class="label">Pro Systems</div>
        </a>
    </div>

    <div class="dock-wrapper">
        <div class="dock">
            <div class="dock-icon">⭕</div>
            <div class="dock-icon">🌐</div>
            <div class="dock-icon">✉️</div>
            <div class="dock-icon">📂</div>
            <div class="dock-icon">⚙️</div>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ":" + 
                            now.getMinutes().toString().padStart(2, '0');
            document.getElementById('clock').textContent = timeStr;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>

</body>
</html>
